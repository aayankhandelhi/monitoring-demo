---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: dev-nginx
  namespace: flux-system
spec:
  interval: 1m
  path: "./addons/nginx-app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system


---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: monitoring-setup
  namespace: flux-system
spec:
  interval: 1m
  path: "./addons/monitoring/setup"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system    

# ###############
# Deploy Monitoring using Prometheus Manifest code after deploy CRD for monitoring
# ###############

---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: monitoring-manifests
  namespace: flux-system
spec:
  dependsOn:
    - name: monitoring-setup
  interval: 1m
  path: "./addons/monitoring/manifests"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system 

# ###############
# Deploy Dashboards
# ###############

---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: monitoring-dashboards
  namespace: flux-system
spec:
  dependsOn:
    - name: monitoring-manifests
  interval: 1m
  path: "./addons/monitoring/dashboards"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system     

